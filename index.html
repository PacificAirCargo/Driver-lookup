<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Driver Sign-In — Pacific Air &amp; Sea Cargo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B3172;
    --navy-dark: #0f1e4a;
    --blue: #29ABE2;
    --blue-light: #e8f6fc;
    --yellow: #F5C518;
    --white: #ffffff;
    --gray-50: #f8f9fb;
    --gray-100: #f0f2f6;
    --gray-200: #e2e6ef;
    --gray-400: #9aa3b8;
    --gray-600: #5a6380;
    --gray-900: #1a1f36;
    --green-bg: #edfaf3;
    --green-border: #6dcfa0;
    --green-text: #0d6e3f;
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --shadow: 0 4px 24px rgba(27,49,114,0.10), 0 1px 4px rgba(27,49,114,0.06);
    --shadow-lg: 0 8px 40px rgba(27,49,114,0.15), 0 2px 8px rgba(27,49,114,0.08);
  }

  html, body {
    min-height: 100%;
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: linear-gradient(150deg, #e8edf8 0%, #d6e4f0 50%, #e0e8f5 100%);
    color: var(--gray-900);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border-radius: 0;
    box-shadow: none;
    width: 100%;
    max-width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── Header ── */
  .card-header {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, #1e3d8f 100%);
    padding: 2rem 2rem 1.75rem;
    text-align: center;
    position: relative;
  }
  .card-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--yellow), var(--blue));
  }
  .logo-wrap {
    display: inline-block;
    margin-bottom: 1.1rem;
  }
  .logo-wrap img {
    height: 60px;
    width: auto;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.25));
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 0.2px;
    margin-bottom: 4px;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.3px;
    font-weight: 400;
  }

  /* ── Body ── */
  .card-body { padding: 2rem; max-width: 480px; width: 100%; margin: 0 auto; flex: 1; display: flex; flex-direction: column; justify-content: center; }

  .instructions {
    font-size: 14px;
    color: var(--gray-600);
    line-height: 1.6;
    margin-bottom: 1.5rem;
    padding: 12px 14px;
    background: var(--gray-50);
    border-radius: var(--radius);
    border-left: 3px solid var(--blue);
  }

  .field { margin-bottom: 1.25rem; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 7px;
  }

  input[type=text] {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    color: var(--gray-900);
    background: var(--gray-50);
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }
  input[type=text]:focus {
    outline: none;
    border-color: var(--blue);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(41,171,226,0.12);
  }
  input[type=text]::placeholder { color: var(--gray-400); }

  /* ── Buttons ── */
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--navy) 0%, #1e3d8f 100%);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(27,49,114,0.3);
    letter-spacing: 0.2px;
    -webkit-appearance: none;
  }
  .btn-primary:hover { opacity: 0.92; box-shadow: 0 4px 16px rgba(27,49,114,0.35); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: var(--gray-200); color: var(--gray-400); box-shadow: none; cursor: not-allowed; transform: none; opacity: 1; }

  .btn-go {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--blue) 0%, #1a90c8 100%);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 2px 12px rgba(41,171,226,0.3);
    -webkit-appearance: none;
  }
  .btn-go:hover { opacity: 0.92; }
  .btn-go:active { transform: scale(0.98); }

  .btn-ghost {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--navy);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-top: 0.5rem;
    -webkit-appearance: none;
  }
  .btn-ghost:hover { background: var(--gray-50); border-color: var(--gray-400); }

  /* ── Status ── */
  .status {
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 14px;
    margin-top: 1rem;
    display: none;
    align-items: center;
    gap: 10px;
    line-height: 1.5;
  }
  .status.loading { display: flex; background: var(--gray-50); border: 1.5px solid var(--gray-200); color: var(--gray-600); }
  .status.notfound { display: flex; background: #fff8e1; border: 1.5px solid #ffe082; color: #7a5800; }
  .status.error { display: flex; background: #fff3f3; border: 1.5px solid #ffb3b3; color: #b00020; }

  /* ── Spinner ── */
  .spin {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 2.5px solid var(--gray-200);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results list ── */
  .results-section { margin-top: 1.25rem; display: none; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }
  .results-count {
    font-size: 13px;
    color: var(--gray-600);
    margin-bottom: 12px;
  }

  .result-item {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 13px 15px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .result-item:hover {
    border-color: var(--blue);
    background: var(--blue-light);
    box-shadow: 0 2px 8px rgba(41,171,226,0.1);
  }
  .result-item.selected {
    border-color: var(--blue);
    background: var(--blue-light);
  }
  .result-name { font-size: 15px; font-weight: 600; color: var(--gray-900); }
  .result-meta { font-size: 13px; color: var(--gray-600); margin-top: 3px; }
  .result-date { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .result-arrow { color: var(--blue); font-size: 20px; flex-shrink: 0; opacity: 0.6; }

  /* ── Preview ── */
  .preview {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-top: 1.25rem;
    display: none;
  }
  .preview-header {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .preview-header-info p {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .preview-header-info strong {
    display: block;
    color: var(--white);
    font-size: 17px;
    font-weight: 600;
    margin-top: 3px;
  }
  .btn-back {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-back:hover { background: rgba(255,255,255,0.2); }

  .preview-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 18px;
    border-top: 1px solid var(--gray-100);
    font-size: 14px;
  }
  .preview-row:nth-child(even) { background: var(--gray-50); }
  .preview-label { color: var(--gray-400); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .preview-value { font-weight: 600; color: var(--gray-900); max-width: 55%; text-align: right; word-break: break-word; }
  .preview-actions { padding: 16px 18px; background: var(--gray-50); border-top: 1px solid var(--gray-100); }

  /* ── Cache bar ── */
  .cache-bar {
    font-size: 11px;
    color: var(--gray-400);
    text-align: center;
    margin-top: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .cache-bar.active { color: var(--green-text); }
  .cache-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* ── Footer ── */
  .card-footer {
    padding: 0.75rem 2rem 1.5rem;
    text-align: center;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }
  .footer-btn {
    background: none;
    border: none;
    font-size: 12px;
    color: var(--gray-400);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
  }
  .footer-btn:hover { color: var(--gray-600); }

  @media (max-width: 480px) {
    .card-body { padding: 1.5rem; }
    .card { border-radius: 0; }
    .card-footer { padding: 0 1.5rem 1.25rem; }
    .card-header { padding: 1.5rem 1.5rem 1.25rem; }
    .logo-wrap img { height: 48px; }
    .header-title { font-size: 19px; }
  }

  /* ── New driver button ── */
  .btn-new-driver {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #29ABE2 0%, #1a90c8 100%);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 2px 12px rgba(41,171,226,0.35);
    letter-spacing: 0.2px;
    -webkit-appearance: none;
    margin-bottom: 0;
  }
  .btn-new-driver:hover { opacity: 0.92; box-shadow: 0 4px 16px rgba(41,171,226,0.4); }
  .btn-new-driver:active { transform: scale(0.98); }

  /* ── Divider ── */
  .divider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 1.25rem 0 1rem;
  }
  .divider-line {
    flex: 1;
    border: none;
    border-top: 1.5px solid var(--gray-200);
  }
  .divider-text {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

</style>
</head>

<script>
  const FORM_ID   = '261510121391039';
  const FORM_URL  = 'https://form.jotform.com/PacificAirCargo/driver-sign-in';
  const API_BASE  = 'https://api.jotform.com';
  const PAGE_SIZE = 100;
  const CACHE_KEY = 'pac_subs_cache';
  const CACHE_TTL = 5 * 60 * 1000;
  const API_KEY   = 'a204ddebe79f4ae2938ef7800e9dbd35';

  let allSubmissions = null;
  let lastData = null;
  let allMatches = [];

  function getKey() { return API_KEY; }

  function hideAll() {
    ['loading','notfound','error'].forEach(id => {
      document.getElementById('status-' + id).style.display = 'none';
    });
    document.getElementById('preview').style.display = 'none';
    document.getElementById('results-section').style.display = 'none';
    document.getElementById('notfound-actions').style.display = 'none';
  }

  function showStatus(which) {
    hideAll();
    if (which) {
      const el = document.getElementById('status-' + which);
      el.style.display = 'flex';
    }
  }

  function showResults() {
    hideAll();
    document.getElementById('results-section').style.display = 'block';
  }

  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (Date.now() - obj.timestamp > CACHE_TTL) return null;
      return obj.data;
    } catch(e) { return null; }
  }
  function saveCache(data) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data })); } catch(e) {}
  }
  function clearCache() {
    allSubmissions = null;
    localStorage.removeItem(CACHE_KEY);
    const bar = document.getElementById('cache-bar');
    bar.innerHTML = '';
    bar.className = 'cache-bar';
    hideAll();
  }
  function updateCacheBar(count, fromCache) {
    const bar = document.getElementById('cache-bar');
    bar.className = 'cache-bar active';
    bar.innerHTML = '<span class="cache-dot"></span>' + count + ' records loaded' + (fromCache ? ' (cached)' : '');
  }

  async function fetchAllSubmissions(apiKey) {
    const cached = loadCache();
    if (cached) {
      allSubmissions = cached;
      updateCacheBar(allSubmissions.length, true);
      return allSubmissions;
    }
    let all = [], offset = 0;
    while (true) {
      setLoadingMsg(offset === 0 ? 'Fetching sign-in records…' : 'Loading… (' + all.length + ' so far)');
      const url = API_BASE + '/form/' + FORM_ID + '/submissions?apiKey=' + apiKey + '&limit=' + PAGE_SIZE + '&offset=' + offset + '&orderby=created_at&direction=DESC';
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const json = await resp.json();
      if (json.responseCode !== 200) throw new Error(json.message || 'API error ' + json.responseCode);
      const page = json.content || [];
      all = all.concat(page);
      if (page.length < PAGE_SIZE) break;
      offset += PAGE_SIZE;
    }
    allSubmissions = all;
    saveCache(all);
    updateCacheBar(all.length, false);
    return all;
  }

  function setLoadingMsg(msg) {
    document.getElementById('loading-msg').textContent = msg;
  }

  function extractNameAndFields(submission) {
    const ans = submission.answers || {};
    let fn = '', ln = '', company = '', rego = '', idtype = '', idnum = '';
    Object.values(ans).forEach(a => {
      if (a.answer && typeof a.answer === 'object' && (a.answer.first !== undefined || a.answer.last !== undefined)) {
        fn = (a.answer.first || '').trim();
        ln = (a.answer.last || '').trim();
      }
      const t = (a.text || '').toLowerCase();
      const n = (a.name || '').toLowerCase();
      const val = typeof a.answer === 'string' ? a.answer.trim() : '';
      if ((t.includes('company') || n.includes('company')) && val) company = val;
      if ((t.includes('registr') || t.includes('rego') || n.includes('vehicle') || n.includes('rego')) && val) rego = val;
      if ((t.includes('i.d type') || t.includes('id type') || (t.includes('type') && t.includes('id')) || n.includes('idtype') || n.includes('id_type')) && val) idtype = val;
      if ((t.includes('i.d number') || t.includes('id number') || n.includes('idnumber') || n.includes('id_number')) && val) idnum = val;
    });
    return { fn, ln, company, rego, idtype, idnum, date: submission.created_at || '' };
  }

  function scoreName(fn, ln, queryFirst) {
    const ff = fn.toLowerCase();
    const qf = queryFirst.toLowerCase();
    let score = 0;
    if (qf && ff === qf) score += 10;
    else if (qf && ff.startsWith(qf)) score += 5;
    else if (qf && ff.includes(qf)) score += 2;
    return score;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch(e) { return dateStr; }
  }

  function renderResults(matches) {
    const list = document.getElementById('results-list');
    const count = document.getElementById('results-count');
    count.textContent = matches.length + ' record' + (matches.length !== 1 ? 's' : '') + ' found — tap to select';
    list.innerHTML = '';
    matches.forEach(function(m, i) {
      const f = m.fields;
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML =
        '<div style="flex:1">' +
          '<div class="result-name">' + f.fn + (f.ln ? ' ' + f.ln : '') + '</div>' +
          '<div class="result-meta">' + (f.company || 'No company recorded') + (f.rego ? ' &nbsp;·&nbsp; ' + f.rego : '') + '</div>' +
          '<div class="result-date">' + formatDate(f.date) + '</div>' +
        '</div>' +
        '<div class="result-arrow">›</div>';
      div.onclick = function() { selectRecord(i); };
      list.appendChild(div);
    });
  }

  function selectRecord(index) {
    const f = allMatches[index].fields;
    lastData = { first: f.fn, last: f.ln, company: f.company, rego: f.rego, idtype: f.idtype, idnum: f.idnum };
    document.querySelectorAll('.result-item').forEach(function(el, i) {
      el.classList.toggle('selected', i === index);
    });
    document.getElementById('prev-name').textContent = f.fn + (f.ln ? ' ' + f.ln : '');
    document.getElementById('prev-company').textContent = f.company || '—';
    document.getElementById('prev-rego').textContent   = f.rego    || '—';
    document.getElementById('prev-idtype').textContent = f.idtype  || '—';
    document.getElementById('prev-idnum').textContent  = f.idnum   || '—';
    hideAll();
    document.getElementById('preview').style.display = 'block';
  }

  async function doLookup() {
    const first = document.getElementById('first').value.trim();
    if (!first) { alert('Please enter your first name.'); return; }

    showStatus('loading');
    document.getElementById('lookup-btn').disabled = true;

    try {
      const subs = await fetchAllSubmissions(getKey());
      const scored = [];
      for (let i = 0; i < subs.length; i++) {
        const fields = extractNameAndFields(subs[i]);
        if (!fields.fn && !fields.ln) continue;
        const score = scoreName(fields.fn, fields.ln, first);
        if (score >= 2) scored.push({ score: score, fields: fields });
      }
      scored.sort(function(a, b) {
        return b.score - a.score || new Date(b.fields.date) - new Date(a.fields.date);
      });

      // Deduplicate — keep only most recent per unique name + company + rego
      const seen = {};
      const deduped = [];
      scored.forEach(function(m) {
        const f = m.fields;
        const key = (f.fn + "|" + f.ln + "|" + f.company + "|" + f.rego).toLowerCase().trim();
        if (!seen[key]) { seen[key] = true; deduped.push(m); }
      });

      if (deduped.length > 0) {
        allMatches = deduped;
        renderResults(deduped);
        hideAll();
        document.getElementById('results-section').style.display = 'block';
      } else {
        lastData = { first: first, last: '', company: '', rego: '', idtype: '', idnum: '' };
        showStatus('notfound');
        document.getElementById('notfound-actions').style.display = 'block';
      }
    } catch(e) {
      document.getElementById('error-msg').textContent = e.message + ' — check network connection.';
      showStatus('error');
    }

    document.getElementById('lookup-btn').disabled = false;
  }

  function openForm(withData) {
    const d = lastData || { first: document.getElementById('first').value.trim(), last: '', company: '', rego: '', idtype: '', idnum: '' };
    const params = new URLSearchParams();
    if (d.first)   params.set('q2_fullname0[first]', d.first);
    if (d.last)    params.set('q2_fullname0[last]',  d.last);
    if (withData) {
      if (d.company) params.set('q3_textbox1', d.company);
      if (d.rego)    params.set('q4_textbox2', d.rego);
      if (d.idtype)  params.set('idType', d.idtype);
      if (d.idnum)   params.set('typeA', d.idnum);
    }
    window.location.href = FORM_URL + '?' + params.toString();
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLookup();
  });
</script>
</body>
</html>
